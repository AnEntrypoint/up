name: Add File

on:
  repository_dispatch:
    types: [up]

permissions:
  contents: write

jobs:
  add-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write file from payload
        env:
          PATH_FIELD: ${{ github.event.client_payload.path }}
          CONTENT: ${{ github.event.client_payload.content }}
        run: |
          if [ -z "$PATH_FIELD" ]; then
            echo "::error::Missing 'path' in client_payload"
            exit 1
          fi
          if [ -z "$CONTENT" ]; then
            echo "::error::Missing 'content' in client_payload"
            exit 1
          fi

          mkdir -p "$(dirname "$PATH_FIELD")"
          printf '%s\n' "$CONTENT" > "$PATH_FIELD"
          echo "wrote $PATH_FIELD ($(wc -c < "$PATH_FIELD") bytes)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "add $PATH_FIELD [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep 3
          done
